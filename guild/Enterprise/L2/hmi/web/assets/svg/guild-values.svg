<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 260" width="1040" height="260" role="img" aria-label="Guild charter · three pillars">
<defs>
    <linearGradient id="gBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <style>
      .t{font-family:'SFMono-Regular',Consolas,monospace}
      .lb{fill:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:1.6px}
      .va{fill:#e6edf3;font-size:20px;font-weight:700}
      .vs{fill:#e6edf3;font-size:14px;font-weight:600}
      .lo{fill:#79c0ff;font-size:11px}
      .sub{fill:#8b949e;font-size:11px}
      .g{fill:#3fb950} .a{fill:#e3b341} .r{fill:#f85149}
      .p{fill:#a371f7} .o{fill:#f0883e}
      .pulse{animation:plz 1.8s ease-out infinite}
      @keyframes plz{
        0%{transform:scale(1);opacity:.85}
        45%{transform:scale(1.35);opacity:.3}
        100%{transform:scale(1.8);opacity:0}
      }
      .spin{animation:sp 4s linear infinite;transform-origin:center}
      @keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    </style>
  </defs>
<rect width="1040" height="36" rx="10" fill="url(#gBg)"/>
  <rect x="0" y="0" width="1040" height="36" rx="10" fill="#161b22"/>
  <rect x="0" y="26" width="1040" height="10" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="520" y="22" text-anchor="middle" class="t" font-size="12" fill="#8b949e">⚒ Guild charter · three pillars</text>
<rect y="36" width="1040" height="224" fill="url(#gBg)"/>
<rect x="20" y="70" width="320" height="140" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="44" y="124" class="t" font-size="40">🤝</text>
<text x="104" y="114" class="t" font-size="22" font-weight="700" fill="#3fb950">Kindness</text>
<text x="104" y="138" class="t sub">pillar 1</text>
<text x="44" y="164" class="t" font-size="12" fill="#e6edf3">How we show up for each other when</text>
<text x="44" y="180" class="t" font-size="12" fill="#e6edf3">the work is hard.</text>
<rect x="360" y="70" width="320" height="140" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="384" y="124" class="t" font-size="40">🧭</text>
<text x="444" y="114" class="t" font-size="22" font-weight="700" fill="#f0883e">Consideration</text>
<text x="444" y="138" class="t sub">pillar 2</text>
<text x="384" y="164" class="t" font-size="12" fill="#e6edf3">Craft reflects care — for users,</text>
<text x="384" y="180" class="t" font-size="12" fill="#e6edf3">teammates, and future readers.</text>
<rect x="700" y="70" width="320" height="140" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="724" y="124" class="t" font-size="40">🎯</text>
<text x="784" y="114" class="t" font-size="22" font-weight="700" fill="#a371f7">Respect</text>
<text x="784" y="138" class="t sub">pillar 3</text>
<text x="724" y="164" class="t" font-size="12" fill="#e6edf3">For the problem, the prior art, and</text>
<text x="724" y="180" class="t" font-size="12" fill="#e6edf3">every craftsperson's time.</text>
<g><rect x="24" y="202" rx="11" width="180" height="22" fill="none" stroke="#3fb950" stroke-width="1" opacity=".6"/><text x="114" y="217" text-anchor="middle" class="t" font-size="11" fill="#3fb950">8 charter signatures</text></g>
<g><rect x="200" y="202" rx="11" width="92" height="22" fill="none" stroke="#f0883e" stroke-width="1" opacity=".6"/><text x="246" y="217" text-anchor="middle" class="t" font-size="11" fill="#f0883e">8 members</text></g>
<text x="1016" y="230" text-anchor="end" class="t sub">kindness · consideration · respect</text>
</svg>